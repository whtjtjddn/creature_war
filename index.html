<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커피 내기 배틀로얄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --bg2: #16162a; --bg3: #1e1e32;
      --border: rgba(255,255,255,.1); --border2: rgba(255,255,255,.07);
      --text: rgba(255,255,255,.92); --text2: rgba(255,255,255,.55); --text3: rgba(255,255,255,.28);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:20px 16px 36px; }
    h1 { font-size:22px; font-weight:700; letter-spacing:-.3px; margin-bottom:3px; }
    .sub { font-size:12px; color:var(--text3); margin-bottom:18px; }
    #wrap { width:100%; max-width:1400px; }
    #game-area { display:flex; gap:12px; align-items:flex-start; }
    #cv { display:block; flex:1; min-width:0; border-radius:16px; border:1px solid var(--border); background:#0B0B1A; }
    #exempt-panel {
      width:120px; flex-shrink:0;
      background:var(--bg2); border:1px solid var(--border2);
      border-radius:12px; padding:12px 10px;
      font-family:var(--font);
    }
    .exempt-card {
      display:flex; align-items:center; gap:6px;
      padding:6px 8px; border-radius:8px;
      margin-bottom:5px; background:var(--bg3);
      border-left:3px solid transparent;
    }
    .exempt-card.exempt { opacity:1; }
    .exempt-card.remaining { opacity:.65; }
    .exempt-card .cname { font-size:11px; font-weight:600; color:var(--text); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .exempt-card .badge { font-size:9px; color:var(--text3); margin-top:1px; }
    #eb { height:34px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:500; border-radius:9px; margin:10px 0; background:var(--bg2); color:var(--text3); border:1px solid transparent; transition:all .3s; }
    #eb.on { background:#1a1206; color:#F6C90E; border-color:#F6C90E44; }
    #pnl { margin-bottom:10px; }
    #ctrl { display:flex; gap:8px; }
    #sb { flex:1; padding:12px; font-size:14px; font-weight:600; border-radius:10px; cursor:pointer; background:#6C63FF; color:#fff; border:none; transition:opacity .15s; }
    #sb:hover { opacity:.88; }
    #rb { padding:12px 16px; font-size:12px; border-radius:10px; cursor:pointer; background:var(--bg2); color:var(--text2); border:1px solid var(--border); transition:opacity .15s; }
    #rb:hover { opacity:.75; }
    #tb { padding:12px 14px; font-size:13px; font-weight:700; border-radius:10px; cursor:pointer; background:linear-gradient(135deg,#F6C90E,#F97316); color:#1a0f00; border:none; transition:transform .12s,opacity .15s; }
    #tb:hover { opacity:.88; transform:scale(1.03); }
    #rnd { padding:12px 14px; font-size:13px; border-radius:10px; cursor:pointer; background:linear-gradient(135deg,#f6ad55,#ed64a6); color:#fff; border:none; font-weight:700; transition:transform .12s,opacity .15s; letter-spacing:-.2px; }
    #rnd:hover { opacity:.88; transform:scale(1.03); }
    #rx { display:none; border-radius:14px; padding:20px; text-align:center; margin-top:12px; }
    .pb { padding:5px 10px; font-size:11px; border-radius:14px; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:var(--font); transition:all .15s; }
    .pb.on { background:var(--text); color:var(--bg); border-color:transparent; }
    .row { display:flex; align-items:center; gap:5px; border:1px solid var(--border2); border-radius:8px; padding:7px 8px 7px 12px; background:var(--bg2); position:relative; overflow:hidden; }
    .row input, .row select { background:transparent; border:none; outline:none; color:var(--text); font-family:var(--font); }
    select { color:var(--text2); } select option { background:#1e1e32; color:var(--text); }
    /* 승리조건 배지 */
    .wbadge { display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:20px; font-size:11px; font-weight:600; background:rgba(108,99,255,.18); color:#a09bff; border:1px solid rgba(108,99,255,.3); }
  </style>
</head>
<body>
  <div id="wrap">
    <h1>☕ 커피 내기 배틀로얄</h1>
    <p class="sub">크리처들이 싸웁니다. 승리조건에 걸린 사람이 커피를 삽니다.</p>
    <div id="game-area">
      <canvas id="cv"></canvas>
      <div id="exempt-panel" style="display:none">
        <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;margin-bottom:10px">🏆 면제</div>
        <div id="exempt-list"></div>
        <div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border2)">
          <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;margin-bottom:8px">⚔ 참가 중</div>
          <div id="remaining-list"></div>
        </div>
      </div>
    </div>
    <div id="eb">크리처를 설정하고 시작하세요</div>
    <div id="pnl"></div>
    <div id="ctrl">
      <button id="sb">시작하기</button>
      <button id="rnd">🎲 랜덤</button>
      <button id="rb">설정으로</button>
    </div>
    <div id="rx"></div>
  </div>

<script>
const CV=document.getElementById('cv'),cx=CV.getContext('2d');
// 풀스크린보다 약간 작게 — 뷰포트 높이의 70%, 최대 740px
const W=CV.offsetWidth||600;
const H=Math.min(Math.round(window.innerHeight*.82),900);
CV.width=W; CV.height=H;
const isMobile=window.innerWidth<=600;
const CREATURE_R=isMobile?14:20;

const COLS=['#B794F4','#48BB78','#FC8181','#F687B3','#F6E05E','#63B3ED','#F6AD55','#4FD1C5','#FB923C','#A3E635'];
const WEPS=['샷건','독침총','미니건','레이저','카타나','부메랑','저격총','로켓','냉동총','화염','전기','유탄','도끼','플라즈마','체인소'];
const WP={
  샷건:  {cd:120, pd:110, hp:200, sp:1.0},   // 5발×18=90 / 4초 → DPS 22.5, 근거리 강
  독침총:{cd:75,  pd:165, hp:160, sp:1.05},  // 명중11+독24=35 / 2.5초 → DPS 14, 장거리
  미니건:{cd:14,  pd:140, hp:260, sp:0.85},  // 5×14=70 / 약14발 → DPS ~25, 지속딜
  레이저:{cd:140, pd:180, hp:165, sp:0.9, ch:55}, // 충전 후 46 / 5초 → DPS 9, 벽통과
  카타나:{cd:90,  pd:55,  hp:170, sp:1.35},  // 44 / 3초 → DPS 15, 초근접
  부메랑:{cd:120, pd:150, hp:190, sp:1.0},   // 왕복 52 / 4초 → DPS 13, 범위
  저격총:{cd:320, pd:200, hp:145, sp:0.9},   // 60 / 10초 → DPS 6, 고뎀 1타
  로켓:  {cd:170, pd:155, hp:185, sp:0.95},  // AOE 38 / 5.5초 → DPS 7, 광역
  냉동총:{cd:80,  pd:145, hp:170, sp:1.1},   // 5+슬로우 / 2.5초 → DPS 2+유틸
  화염:  {cd:55,  pd:75,  hp:215, sp:1.0},   // 14×범위 / 1.8초 → DPS 가변, 근접
  전기:  {cd:120, pd:130, hp:170, sp:1.0},   // 22+14=36 체인 / 4초 → DPS 9
  유탄:  {cd:150, pd:125, hp:185, sp:0.95},  // AOE 35 / 5초 → DPS 7, 광역
  도끼:  {cd:100, pd:50,  hp:200, sp:1.2},   // 52 / 3.3초 → DPS 16, 광호
  플라즈마:{cd:145,pd:190,hp:160, sp:0.95, ch:40}, // 42 튕김 / 5초 → DPS 8
  체인소:{cd:10,  pd:35,  hp:235, sp:1.1},   // 9×연속 / 초고속 → DPS 27, 초근접
};

// 승리조건 레이블
const wLabels={last:'최후 생존자 커피',first:'첫 번째 사망자 커피',nth:'N번째 사망자 커피',exempt:'최후 생존자 면제'};

let mode='setup',pCount=3,wMode='exempt',dN=1;
let cfgs=[],creatures=[],projs=[],parts=[],floats=[],obs=[];
let winner=null,deathOrd=[],aId=null,sId=null,evT=0,fc=0;
let cX=W/2,cY=H/2,cZ=1,tX=W/2,tY=H/2,tZ=1,ts=1,tts=1,vig=0,shk=0,SX=0,SY=0;
let dramaL=[],prevDL=0,dFlash=0;

function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function near(a,c){return a&&a.length?a.reduce((p,q)=>d2(p,c)<d2(q,c)?p:q):null;}
function tDir(c,t){const dx=t.x-c.x,dy=t.y-c.y,d=Math.sqrt(dx*dx+dy*dy)||1;return{dx,dy,d,a:Math.atan2(dy,dx)};}
function addFl(t,x,y,col){floats.push({t,x,y,vy:-.45,l:1,col});}
function spP(x,y,col,n){for(let i=0;i<(n||7);i++)parts.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,r:1.5+Math.random()*3,l:1,col});}
function glow(x,y,r,col){cx.globalAlpha=.09;cx.fillStyle=col;cx.beginPath();cx.arc(x,y,r+13,0,Math.PI*2);cx.fill();cx.globalAlpha=.17;cx.fillStyle=col;cx.beginPath();cx.arc(x,y,r+5,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
function addShk(m){shk=Math.max(shk,m);}
function initCfgs(){cfgs=COLS.map((col,i)=>({name:`${i+1}P`,wep:WEPS[i%WEPS.length],col}));}

function checkDrama(c){if(!c||!c.alive||c.hp/c.hp0>=.22)return;const ex=dramaL.find(d=>d.c===c);if(ex)ex.t=128;else dramaL.push({c,t:128});}
function updCam(){
  dramaL.forEach(d=>{d.t--;if(!d.c.alive||d.c.hp/d.c.hp0>.3)d.t=0;});
  dramaL=dramaL.filter(d=>d.t>0&&d.c.alive);
  const n=dramaL.length;
  if(n>prevDL){addShk(n===1?5:3);dFlash=80;}
  if(n===0&&prevDL>0)addShk(2);
  prevDL=n;
  const any=n>0;
  if(n===1){
    const c=dramaL[0].c,zm=1.42;
    const en=near(creatures.filter(o=>o.alive&&o!==c),c);
    const mx=en?(c.x+en.x)/2:c.x,my=en?(c.y+en.y)/2:c.y;
    const hw=W/(2*zm),hh=H/(2*zm);
    tX=Math.max(hw,Math.min(W-hw,mx));tY=Math.max(hh,Math.min(H-hh,my));tZ=zm;
  }else{tX=W/2;tY=H/2;tZ=1;}
  tts=any?.32:1;vig+=(any?1:0-vig)*.08;
  cX+=(tX-cX)*.08;cY+=(tY-cY)*.08;cZ+=(tZ-cZ)*(tZ>cZ?.09:.05);
  // 슬로우 진입은 빠르게, 정상 복귀는 천천히 (급격한 속도 변화 방지)
  ts+=(tts-ts)*(tts<ts?.07:.018);
}
function resetCam(){cX=tX=W/2;cY=tY=H/2;cZ=tZ=1;ts=tts=1;vig=shk=0;dramaL=[];prevDL=0;dFlash=0;}

// 맵 테마 목록
const MAP_THEMES=[
  {name:'폐허',fill:'#12101e',stroke:'rgba(130,80,200,.5)',hatch:'rgba(130,80,200,.12)'},
  {name:'공장',fill:'#0e1510',stroke:'rgba(60,180,80,.45)',hatch:'rgba(60,180,80,.10)'},
  {name:'우주정거장',fill:'#0a0f1a',stroke:'rgba(60,140,240,.5)',hatch:'rgba(60,140,240,.11)'},
  {name:'화산',fill:'#1a0a00',stroke:'rgba(240,90,30,.5)',hatch:'rgba(240,90,30,.10)'},
  {name:'얼음동굴',fill:'#08111a',stroke:'rgba(100,210,255,.48)',hatch:'rgba(100,210,255,.10)'},
  {name:'고대신전',fill:'#15120a',stroke:'rgba(210,170,50,.48)',hatch:'rgba(210,170,50,.10)'},
];
let mapTheme=MAP_THEMES[0];
let mapBg='#0B0B1A';

// 맵 배경 dot 색
const BG_DOTS={'폐ruins':'#B794F4','폐허':'#6644aa','공장':'#336644','우주정거장':'#1155aa','화산':'#aa3300','얼음동굴':'#224466','고대신전':'#665511'};

function addObs(x,y,w,h){obs.push({x,y,w,h});}
function tryPlace(x,y,w,h,pad=32){
  if(x<20||y<20||x+w>W-20||y+h>H-20)return false;
  for(const o of obs)if(x<o.x+o.w+pad&&x+w>o.x-pad&&y<o.y+o.h+pad&&y+h>o.y-pad)return false;
  return true;
}

function genObs(){
  obs=[];
  mapTheme=MAP_THEMES[~~(Math.random()*MAP_THEMES.length)];

  // 맵 배경색: 테마마다 약간씩 다르게
  const bgMap={'폐허':'#0d0b18','공장':'#090e0a','우주정거장':'#080c14','화산':'#120700','얼음동굴':'#070d13','고대신전':'#0e0c07'};
  mapBg=bgMap[mapTheme.name]||'#0B0B1A';

  const type=~~(Math.random()*7);

  if(type===0){
    // 랜덤 산재형 — 캔버스 넓이에 비례해 늘림
    const n=7+~~(Math.random()*5);
    const shapes=[
      ()=>({w:24+~~(Math.random()*34),h:24+~~(Math.random()*34)}),
      ()=>({w:70+~~(Math.random()*60),h:12+~~(Math.random()*12)}),
      ()=>({w:12+~~(Math.random()*12),h:70+~~(Math.random()*60)}),
    ];
    for(let i=0;i<n;i++)for(let a=0;a<120;a++){
      const s=shapes[~~(Math.random()*shapes.length)]();
      const x=70+Math.random()*(W-s.w-140),y=55+Math.random()*(H-s.h-110);
      if(tryPlace(x,y,s.w,s.h)){addObs(x,y,s.w,s.h);break;}
    }
  } else if(type===1){
    // 복도형 — 가로벽 3줄
    const t=18,gap=85+~~(Math.random()*55);
    const ys=[H*.25,H*.5,H*.75].map(y=>y+~~((Math.random()-.5)*25));
    ys.forEach(y=>{
      const openX=55+~~(Math.random()*(W-gap-110));
      if(tryPlace(28,y,openX-28,t,16))addObs(28,y,openX-28,t);
      if(tryPlace(openX+gap,y,W-openX-gap-28,t,16))addObs(openX+gap,y,W-openX-gap-28,t);
    });
    // 세로벽 2개
    [W*.33,W*.67].forEach(xm=>{
      xm+=~~((Math.random()-.5)*40);
      const openY=65+~~(Math.random()*(H-gap-130));
      if(tryPlace(xm,ys[0]+t,t,openY-ys[0]-t,16))addObs(xm,ys[0]+t,t,openY-ys[0]-t);
      if(tryPlace(xm,openY+gap,t,ys[2]-openY-gap,16))addObs(xm,openY+gap,t,ys[2]-openY-gap);
    });
  } else if(type===2){
    // 방(Room)형 — 모서리 큰 블록 + 중앙 장애물 여러 개
    const pad=52,sz=55+~~(Math.random()*38);
    [[pad,pad],[W-pad-sz,pad],[pad,H-pad-sz],[W-pad-sz,H-pad-sz]].forEach(([x,y])=>{
      if(tryPlace(x,y,sz,sz,28))addObs(x,y,sz,sz);
    });
    for(let i=0;i<4;i++)for(let a=0;a<80;a++){
      const w=18+~~(Math.random()*28),h=18+~~(Math.random()*28);
      const x=W/2-120+Math.random()*240-w/2,y=H/2-90+Math.random()*180-h/2;
      if(tryPlace(x,y,w,h,34)){addObs(x,y,w,h);break;}
    }
  } else if(type===3){
    // 미로형 — 격자 4×3
    const cols=4,rows=3;
    const cw=(W-100)/cols,ch=(H-100)/rows;
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      if(Math.random()<.6){
        const isH=Math.random()<.5;
        const w=isH?55+~~(Math.random()*55):13+~~(Math.random()*9);
        const h=isH?13+~~(Math.random()*9):55+~~(Math.random()*55);
        const x=55+c*cw+Math.random()*(cw-w-10);
        const y=50+r*ch+Math.random()*(ch-h-10);
        if(tryPlace(x,y,w,h,24))addObs(x,y,w,h);
      }
    }
  } else if(type===4){
    // 원형 경기장 — 외곽 기둥 많이 + 내부 보조 기둥 + 중앙
    const n=8+~~(Math.random()*4),R=Math.min(W,H)*.36;
    const sz=18+~~(Math.random()*14);
    for(let i=0;i<n;i++){
      const a=i/n*Math.PI*2;
      const x=W/2+Math.cos(a)*R-sz/2,y=H/2+Math.sin(a)*R-sz/2;
      if(tryPlace(x,y,sz,sz,20))addObs(x,y,sz,sz);
    }
    // 중간 링
    const n2=4+~~(Math.random()*3),R2=R*.52,sz2=14+~~(Math.random()*10);
    for(let i=0;i<n2;i++){
      const a=(i+.5)/n2*Math.PI*2;
      const x=W/2+Math.cos(a)*R2-sz2/2,y=H/2+Math.sin(a)*R2-sz2/2;
      if(tryPlace(x,y,sz2,sz2,20))addObs(x,y,sz2,sz2);
    }
    const cs=28+~~(Math.random()*22);
    if(tryPlace(W/2-cs/2,H/2-cs/2,cs,cs,26))addObs(W/2-cs/2,H/2-cs/2,cs,cs);
  } else if(type===5){
    // 대각선형 — 2줄 사선 배열
    for(let diag=0;diag<2;diag++){
      const n=4+~~(Math.random()*3);
      for(let i=0;i<n;i++){
        const t2=Math.random()<.5;
        const w=t2?65+~~(Math.random()*45):14+~~(Math.random()*10);
        const h=t2?14+~~(Math.random()*10):65+~~(Math.random()*45);
        const frac=(i+.5)/n;
        const bx=diag===0?60:W-60-w;
        const x=bx+frac*(diag===0?W*.4:-W*.4)-w/2+(Math.random()-.5)*40;
        const y=55+frac*(H-110)-h/2+(Math.random()-.5)*35;
        if(tryPlace(x,y,w,h,28))addObs(x,y,w,h);
      }
    }
  } else {
    // 스나이퍼 레인 — 세로벽 3개 + 가로 엄폐물 여러 개
    const t=14;
    [W*.24,W*.5,W*.76].forEach(xBase=>{
      const xm=xBase+~~((Math.random()-.5)*28);
      const gap=55+~~(Math.random()*55),top=55+~~(Math.random()*85);
      if(tryPlace(xm,45,t,top-45,16))addObs(xm,45,t,top-45);
      if(tryPlace(xm,top+gap,t,H-top-gap-45,16))addObs(xm,top+gap,t,H-top-gap-45);
    });
    for(let i=0;i<4;i++)for(let a=0;a<80;a++){
      const w=50+~~(Math.random()*50),h=13+~~(Math.random()*5);
      const x=80+Math.random()*(W-w-160),y=75+Math.random()*(H-150);
      if(tryPlace(x,y,w,h,30)){addObs(x,y,w,h);break;}
    }
  }
  // 어떤 타입이든 추가 소형 장애물 2~3개 산재
  for(let i=0;i<2+~~(Math.random()*2);i++)for(let a=0;a<80;a++){
    const w=16+~~(Math.random()*20),h=16+~~(Math.random()*20);
    const x=65+Math.random()*(W-w-130),y=50+Math.random()*(H-h-100);
    if(tryPlace(x,y,w,h,30)){addObs(x,y,w,h);break;}
  }
}
function chR(px,py,pr,rx,ry,rw,rh){const nx=Math.max(rx,Math.min(px,rx+rw)),ny=Math.max(ry,Math.min(py,ry+rh));return(px-nx)**2+(py-ny)**2<pr*pr;}

function sPo(n){const pos=[],md=Math.max(40,Math.min(70,W/n*.9));for(let i=0;i<n;i++){let p=null;for(let a=0;a<120;a++){const x=55+Math.random()*(W-110),y=50+Math.random()*(H-100);let ok=true;for(const o of obs)if(x>o.x-28&&x<o.x+o.w+28&&y>o.y-28&&y<o.y+o.h+28){ok=false;break;}if(ok)for(const q of pos)if(d2({x,y},q)<md*md){ok=false;break;}if(ok){p={x,y};break;}}pos.push(p||{x:60+Math.random()*(W-120),y:55+Math.random()*(H-110)});}return pos;}

function stepC(c){

  if(c.poi>0){c.hp=Math.max(0,c.hp-.20*ts);c.poi-=ts;c.hfl=3;}

  if(c.chain){c.chain.l-=ts;if(c.chain.l<=0)c.chain=null;}
  if(c.flm){c.flm.l-=ts;if(c.flm.l<=0)c.flm=null;}
  c.trail.unshift({x:c.x,y:c.y});if(c.trail.length>7)c.trail.pop();
  const en=creatures.filter(o=>o.alive&&o!==c),tgt=near(en,c);

  const wm=48,wf=.044;if(c.x<wm)fx+=wf*(wm-c.x)/wm;if(c.x>W-wm)fx-=wf*(c.x-(W-wm))/wm;if(c.y<wm)fy+=wf*(wm-c.y)/wm;if(c.y>H-wm)fy-=wf*(c.y-(H-wm))/wm;

  obs.forEach(o=>{const nx=Math.max(o.x,Math.min(c.x,o.x+o.w)),ny=Math.max(o.y,Math.min(c.y,o.y+o.h));const dx=c.x-nx,dy=c.y-ny,d=Math.sqrt(dx*dx+dy*dy)||1,mg=c.r+32;if(d<mg){fx+=dx/d*(mg-d)/mg*.05;fy+=dy/d*(mg-d)/mg*.05;}});

function stepP(p){

      if(p.tp==='bo')p.hs.push(o);else p.l=0;
    }
  });
}

    const t=meteor.prog;
    meteor.x=meteor.x+(meteor.tx-meteor.x)*.045;
    meteor.y=meteor.y+(meteor.ty-meteor.y)*.045;
    if(meteor.prog>=1||Math.hypot(meteor.x-meteor.tx,meteor.y-meteor.ty)<12){
      // 충돌!
      const tgt=meteor.target;
      if(tgt&&tgt.alive){tgt.hp=Math.max(0,tgt.hp-65);tgt.hfl=22;checkDrama(tgt);addFl('-65!',tgt.x,tgt.y-tgt.r-12,'#FC8181');}
      spP(meteor.tx,meteor.ty,'#FC8181',20);spP(meteor.tx,meteor.ty,'#F6AD55',12);spP(meteor.tx,meteor.ty,'#fff',8);
      addShk(12);
      meteor.phase='impact';meteor.shockR=0;meteor.shockA=1;
    }
  } else if(meteor.phase==='impact'){
    meteor.shockR+=6*ts;meteor.shockA-=.045*ts;
    if(meteor.shockA<=0)meteor=null;
  }
}
function drawMeteor(){
  if(!meteor)return;
  if(meteor.phase==='fall'){

    const pulse=.5+.5*Math.sin(Date.now()*.025);

    meteor.trail.forEach((pt,i)=>{

    });cx.globalAlpha=1;
    // 운석 본체
    const sz=12;
    cx.save();cx.translate(meteor.x,meteor.y);cx.rotate(Math.PI*.4);
    cx.fillStyle='#FC8181';cx.beginPath();cx.ellipse(0,0,sz*.7,sz,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,255,255,.4)';cx.beginPath();cx.ellipse(-sz*.15,-sz*.2,sz*.22,sz*.35,-.3,0,Math.PI*2);cx.fill();
    cx.globalAlpha=.5;cx.fillStyle='#F97316';cx.beginPath();cx.ellipse(0,sz*.6,sz*.3,sz*.5,0,0,Math.PI*2);cx.fill();
    cx.restore();cx.globalAlpha=1;
    // 빛 글로우
    const g=cx.createRadialGradient(meteor.x,meteor.y,0,meteor.x,meteor.y,28);
    g.addColorStop(0,'rgba(252,129,129,.45)');g.addColorStop(1,'rgba(252,129,129,0)');
    cx.fillStyle=g;cx.beginPath();cx.arc(meteor.x,meteor.y,28,0,Math.PI*2);cx.fill();
  } else if(meteor.phase==='impact'){
    // 충격파 링
    cx.globalAlpha=meteor.shockA*.8;
    cx.strokeStyle='#FC8181';cx.lineWidth=3;
    cx.beginPath();cx.arc(meteor.tx,meteor.ty,meteor.shockR,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=meteor.shockA*.3;
    cx.strokeStyle='#F6AD55';cx.lineWidth=1.5;
    cx.beginPath();cx.arc(meteor.tx,meteor.ty,meteor.shockR*.65,0,Math.PI*2);cx.stroke();
    // 크레이터 플래시
    const g=cx.createRadialGradient(meteor.tx,meteor.ty,0,meteor.tx,meteor.ty,meteor.shockR*.5);
    g.addColorStop(0,`rgba(252,129,129,${meteor.shockA*.55})`);g.addColorStop(1,'rgba(252,129,129,0)');
    cx.fillStyle=g;cx.beginPath();cx.arc(meteor.tx,meteor.ty,meteor.shockR*.5,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }
}

let evFX=[]; // [{type, ...state}]

function stepEvFX(){
  evFX.forEach(f=>{
    f.life-=ts;
    if(f.type==='overheat'){
      // 과열: 링 확장 + 파티클
      f.r+=5.5*ts;f.a=Math.max(0,f.a-.028*ts);
      if(f.phase==='warn'&&f.r>55){f.phase='burst';f.r=0;f.a=1;
        spP(f.x,f.y,'#F97316',14);spP(f.x,f.y,'#FBD38D',8);addShk(4);}
    } else if(f.type==='heal'){
      f.r+=4*ts;f.a=Math.max(0,f.a-.022*ts);
    } else if(f.type==='curse'){
      f.r+=3.5*ts;f.a=Math.max(0,f.a-.024*ts);
    } else if(f.type==='explosion'){
      f.r+=8*ts;f.a=Math.max(0,f.a-.025*ts);
      if(f.r2!==undefined){f.r2+=5*ts;}
    }
  });
  evFX=evFX.filter(f=>f.life>0&&f.a>0);
}

  });
}

// ─── 맵 축소 존 ──────────────────────────────────────────
let zone={x:0,y:0,w:W,h:H,tx:0,ty:0,tw:W,th:H,phase:'wait',timer:0,warnAlpha:0};
const ZONE_WAIT=900;    // 대기 프레임 (약 30초)
function zoneWait(){return creatures.filter(c=>c.alive).length<=2?480:ZONE_WAIT;} // 1v1이면 16초
function zoneShrinkSpeed(){return creatures.filter(c=>c.alive).length<=2?0.18:ZONE_SPEED;}
const ZONE_WARN=120;    // 경고 깜빡임 프레임
const ZONE_SPEED=0.28;  // 초당 수축 속도(px)
const ZONE_MIN=80;      // 최소 여백

function resetZone(){
  zone={x:0,y:0,w:W,h:H,tx:0,ty:0,tw:W,th:H,phase:'wait',timer:0,warnAlpha:0};
}
function nextZoneTarget(){
  const shrink=60+~~(Math.random()*60); // 한 단계 수축량
  const nx=zone.tx+shrink*(Math.random()*.6+.2);
  const ny=zone.ty+shrink*(Math.random()*.6+.2);
  const nw=Math.max(zone.tw-shrink*2,ZONE_MIN*2);
  const nh=Math.max(zone.th-shrink*2,ZONE_MIN*2);
  zone.tx=Math.min(nx,W/2-ZONE_MIN);
  zone.ty=Math.min(ny,H/2-ZONE_MIN);
  zone.tw=nw;zone.th=nh;
}
function stepZone(){
  zone.timer+=ts;
  if(zone.phase==='wait'){
    if(zone.timer>=zoneWait()){zone.phase='warn';zone.timer=0;zone.warnAlpha=0;nextZoneTarget();setBan('⚠️ 맵이 좁아집니다!');}
  } else if(zone.phase==='warn'){
    zone.warnAlpha=.5+.5*Math.sin(zone.timer*.18);
    if(zone.timer>=ZONE_WARN){zone.phase='shrink';zone.timer=0;}
  } else if(zone.phase==='shrink'){
    zone.x+=(zone.tx-zone.x)*zoneShrinkSpeed()*ts*.06;
    zone.y+=(zone.ty-zone.y)*zoneShrinkSpeed()*ts*.06;
    zone.w+=(zone.tw-zone.w)*zoneShrinkSpeed()*ts*.06;
    zone.h+=(zone.th-zone.h)*zoneShrinkSpeed()*ts*.06;
    const diff=Math.abs(zone.x-zone.tx)+Math.abs(zone.y-zone.ty)+Math.abs(zone.w-zone.tw)+Math.abs(zone.h-zone.th);
    if(diff<4){
      // 수렴 시 정확히 목표값으로 스냅
      zone.x=zone.tx;zone.y=zone.ty;zone.w=zone.tw;zone.h=zone.th;
      if(zone.tw<=ZONE_MIN*2+8)zone.phase='hold';
      else{zone.phase='wait';zone.timer=0;zone.warnAlpha=0;}
    }
  }
  // 존이 풀맵보다 작으면 항상 경계 강제 적용 (모든 phase)

function pushZone(c){

function drawZone(){

  }
}

    cx.font=`700 ${~~loserFS}px sans-serif`;
    cx.globalAlpha=textA*.85;cx.strokeStyle='rgba(0,0,0,.9)';cx.lineWidth=6;cx.strokeText(loser.name+' ☕ 커피!',W/2,H/2+40);
    cx.globalAlpha=textA;cx.fillStyle=loser.col;cx.fillText(loser.name+' ☕ 커피!',W/2,H/2+40);
    cx.font=`500 ${Math.round(loserFS*.5)}px sans-serif`;
    cx.fillStyle='rgba(255,255,255,.45)';cx.fillText(loser.wep+' · 첫 번째 탈락',W/2,H/2+74);
  } else {

  // 서브 텍스트: 커피 사야함
  const subFS=Math.min(28,W*.038)*textA;
  cx.font=`700 ${~~subFS}px sans-serif`;
  cx.fillStyle='rgba(255,255,255,.9)';
  cx.globalAlpha=textA;
  const subTxt=loser?`${loser.name} (${loser.wep}) 커피 사야함! ☕`:'전멸';
  cx.fillText(subTxt,W/2,H/2+44);

  } // end non-exempt

  // 승리조건 작은 텍스트
  const tagFS=Math.min(16,W*.022)*textA;
  cx.font=`500 ${~~tagFS}px sans-serif`;
  cx.fillStyle='rgba(255,255,255,.38)';
  cx.fillText(`승리조건: ${wLabels[wMode]}${wMode==='nth'?' ('+dN+'번째)':''}`,W/2,H/2+82);

  // 사망순서
  if(deathOrd.length){
    const dfs=Math.min(13,W*.018)*textA;
    cx.font=`500 ${~~dfs}px sans-serif`;
    cx.fillStyle='rgba(255,255,255,.28)';
    const dTxt='사망순서: '+deathOrd.map(c=>c.name).join(' → ');
    cx.fillText(dTxt,W/2,H/2+108);
  }

  // 컬러 라인 장식 (좌우)
  const lw=Math.min(180,W*.22)*textA;
  const ly=H/2-20;
  cx.strokeStyle=col;cx.lineWidth=2;cx.globalAlpha=textA*.5;
  cx.beginPath();cx.moveTo(W/2-lw-60,ly);cx.lineTo(W/2-60,ly);cx.stroke();
  cx.beginPath();cx.moveTo(W/2+60,ly);cx.lineTo(W/2+lw+60,ly);cx.stroke();

  // 하단 안내
  const hintFS=Math.min(13,W*.018)*textA;
  cx.font=`400 ${~~hintFS}px sans-serif`;
  cx.fillStyle='rgba(255,255,255,.22)';
  cx.fillText('클릭하여 다시 시작',W/2,H-36);

  cx.globalAlpha=1;
}
function startG(){
  if(mode==='ended'){
    if(endState?.isRoundEnd){tournamentNextRound();}
    else{backS();}
    return;
  }
  if(mode==='playing')return;
  cancelAnimationFrame(sId);
  // 최후 생존자 면제 = 토너먼트 모드
  if(wMode==='exempt'){
    tournamentStart();
    return;
  }
  init();mode='playing';evT=0;fc=0;
  document.getElementById('rx').style.display='none';document.getElementById('sb').textContent='진행 중...';
  setBan('🥊 배틀 시작! 🎯 첫 처치 시 전원 +70 HP!');loop();
}
function startTournament(){
  if(mode==='playing')return;
  cancelAnimationFrame(sId);cancelAnimationFrame(aId);
  tournamentStart();
}
function backS(){
  mode='setup';winner=null;cancelAnimationFrame(aId);
  projs=[];parts=[];floats=[];obs=[];deathOrd=[];meteor=null;evFX=[];endState=null;
  tournament={active:false,round:0,exempt:[],remaining:[],allCfgs:[],coffeeGuy:null};
  resetZone();resetCam();
  document.getElementById('exempt-panel').style.display='none';
  document.getElementById('rx').style.display='none';document.getElementById('sb').textContent='시작하기';
  document.getElementById('eb').textContent='크리처를 설정하고 시작하세요';document.getElementById('eb').classList.remove('on');
  genObs();rSetup();sLoop();
}
// ─── 토너먼트 시스템 (최후 생존자 면제 연속 진행) ───────────
let tournament={
  active:false,
  round:0,
  exempt:[],      // 면제된 cfgs 배열 (순서대로)
  remaining:[],   // 아직 남은 cfgs
  coffeeGuy:null, // 최종 커피 구매자
};

function updateExemptPanel(){
  const panel=document.getElementById('exempt-panel');
  const exemptList=document.getElementById('exempt-list');
  const remainingList=document.getElementById('remaining-list');
  if(!tournament.active){panel.style.display='none';return;}
  panel.style.display='block';
  // 면제된 사람들
  exemptList.innerHTML=tournament.exempt.map((c,i)=>`
    <div class="exempt-card exempt" style="border-left-color:${c.col}">
      <div>
        <div class="cname" style="color:${c.col}">${c.name}</div>
        <div class="badge">${i+1}라운드 면제</div>
      </div>
    </div>`).join('');
  // 아직 참가 중인 사람들
  remainingList.innerHTML=tournament.remaining.map(c=>`
    <div class="exempt-card remaining" style="border-left-color:${c.col}">
      <div class="cname">${c.name}</div>
    </div>`).join('');
}

function tournamentStart(){
  tournament.active=true;
  tournament.round=1;
  tournament.exempt=[];
  tournament.allCfgs=[...cfgs.slice(0,pCount)];
  tournament.remaining=[...tournament.allCfgs];
  tournament.coffeeGuy=null;
  tournamentRound();
}

function tournamentRound(){
  cancelAnimationFrame(sId);cancelAnimationFrame(aId);
  document.getElementById('rx').style.display='none';
  endState=null;
  cfgs=[...tournament.remaining];
  pCount=tournament.remaining.length;
  genObs();
  init();mode='playing';evT=0;fc=0;finalRoundDone=false;
  updateExemptPanel();
  const rem=tournament.remaining.length;
  const ex=tournament.exempt.length;
  setBan(`🏆 라운드 ${tournament.round} — ${rem}명 참가 · ${ex}명 면제`);
  document.getElementById('sb').textContent='진행 중...';
  loop();
}

function tournamentNextRound(){
  if(winner){
    const w=cfgs.find(c=>c.name===winner.name)||winner;
    tournament.exempt.push({...w});
  }
  const exemptNames=new Set(tournament.exempt.map(c=>c.name));
  tournament.remaining=tournament.allCfgs.filter(c=>!exemptNames.has(c.name));
  updateExemptPanel();
  if(tournament.remaining.length<=1){
    tournament.coffeeGuy=tournament.remaining[0]||null;
    tournament.active=false;
    showTournamentEnd();
    return;
  }
  tournament.round++;
  tournamentRound();
}

function showTournamentEnd(){
  const loser=tournament.coffeeGuy;
  const col=loser?.col||'#FC8181';
  const particles=[];
  for(let i=0;i<80;i++){
    const a=Math.random()*Math.PI*2,spd=2+Math.random()*6;
    particles.push({x:W/2,y:H/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-3,r:3+Math.random()*6,l:1,
      col:i%4===0?'#F6C90E':i%4===1?col:i%4===2?'#fff':'#FC8181',rot:Math.random()*Math.PI*2,rspd:(Math.random()-.5)*.2});
  }
  endState={loser,phase:'intro',timer:0,particles,col,isTournament:true,exempt:tournament.exempt,coffeeGuy:tournament.coffeeGuy};
  mode='ended';
  rLive();
  document.getElementById('sb').textContent='처음으로';
}
const RNAMES=['철수','영희','민준','서연','지훈','하은','태양','나비','번개','폭풍','그림자','유령','도깨비','불꽃','얼음','독수리','늑대','호랑이','용','봉황','악마','천사','닌자','해적','마법사','전사','궁수','검사','성기사','암살자'];

function startRandom(){
  if(mode==='playing')return;
  cancelAnimationFrame(sId);cancelAnimationFrame(aId);

  // 무기만 랜덤
  cfgs.slice(0,pCount).forEach(c=>{c.wep=WEPS[~~(Math.random()*WEPS.length)];});

  // 2) 카운트다운 연출 후 시작
  document.getElementById('rx').style.display='none';
  rSetup();

  let cnt=3;
  const tick=()=>{
    setBan(`🎲 랜덤 배틀 시작! ${cnt}...`);
    if(cnt-->1){setTimeout(tick,700);}
    else{
      setTimeout(()=>{
        init();mode='playing';evT=0;fc=0;
        document.getElementById('sb').textContent='진행 중...';
        setBan('🎲 GO!');loop();
      },700);
    }
  };
  tick();
}

document.getElementById('sb').onclick=startG;
document.getElementById('rb').onclick=backS;
document.getElementById('rnd').onclick=startRandom;
CV.addEventListener('click',()=>{
  if(mode==='ended'){
    if(endState?.isRoundEnd)tournamentNextRound();
    else backS();
  }
});
window.addEventListener('resize',()=>{
  const nw=CV.offsetWidth;if(Math.abs(nw-W)<2)return;
  location.reload();
});
initCfgs();genObs();rSetup();sLoop();
</script>
