<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커피 내기 배틀로얄</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --bg2: #16162a; --bg3: #1e1e32;
      --border: rgba(255,255,255,.1); --border2: rgba(255,255,255,.07);
      --text: rgba(255,255,255,.92); --text2: rgba(255,255,255,.55); --text3: rgba(255,255,255,.28);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:20px 16px 36px; }
    h1 { font-size:22px; font-weight:700; letter-spacing:-.3px; margin-bottom:3px; }
    .sub { font-size:12px; color:var(--text3); margin-bottom:18px; }
    #wrap { width:100%; max-width:1100px; }
    #cv { display:block; width:100%; border-radius:16px; border:1px solid var(--border); background:#0B0B1A; }
    #eb { height:34px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:500; border-radius:9px; margin:10px 0; background:var(--bg2); color:var(--text3); border:1px solid transparent; transition:all .3s; }
    #eb.on { background:#1a1206; color:#F6C90E; border-color:#F6C90E44; }
    #pnl { margin-bottom:10px; }
    #ctrl { display:flex; gap:8px; }
    #sb { flex:1; padding:12px; font-size:14px; font-weight:600; border-radius:10px; cursor:pointer; background:#6C63FF; color:#fff; border:none; transition:opacity .15s; }
    #sb:hover { opacity:.88; }
    #rb { padding:12px 18px; font-size:12px; border-radius:10px; cursor:pointer; background:var(--bg2); color:var(--text2); border:1px solid var(--border); transition:opacity .15s; }
    #rb:hover { opacity:.75; }
    #rx { display:none; border-radius:14px; padding:20px; text-align:center; margin-top:12px; }
    .pb { padding:5px 10px; font-size:11px; border-radius:14px; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:var(--font); transition:all .15s; }
    .pb.on { background:var(--text); color:var(--bg); border-color:transparent; }
    .row { display:flex; align-items:center; gap:5px; border:1px solid var(--border2); border-radius:8px; padding:7px 8px 7px 12px; background:var(--bg2); position:relative; overflow:hidden; }
    .row input, .row select { background:transparent; border:none; outline:none; color:var(--text); font-family:var(--font); }
    select { color:var(--text2); } select option { background:#1e1e32; color:var(--text); }
    /* 승리조건 배지 */
    .wbadge { display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:20px; font-size:11px; font-weight:600; background:rgba(108,99,255,.18); color:#a09bff; border:1px solid rgba(108,99,255,.3); }
  </style>
</head>
<body>
  <div id="wrap">
    <h1>☕ 커피 내기 배틀로얄</h1>
    <p class="sub">크리처들이 싸웁니다. 승리조건에 걸린 사람이 커피를 삽니다.</p>
    <canvas id="cv"></canvas>
    <div id="eb">크리처를 설정하고 시작하세요</div>
    <div id="pnl"></div>
    <div id="ctrl">
      <button id="sb">시작하기</button>
      <button id="rb">설정으로</button>
    </div>
    <div id="rx"></div>
  </div>

<script>
const CV=document.getElementById('cv'),cx=CV.getContext('2d');
// 풀스크린보다 약간 작게 — 뷰포트 높이의 70%, 최대 740px
const W=CV.offsetWidth||600;
const H=Math.min(Math.round(window.innerHeight*.70),740);
CV.width=W; CV.height=H;

const COLS=['#B794F4','#48BB78','#FC8181','#F687B3','#F6E05E','#63B3ED','#F6AD55','#4FD1C5','#FB923C','#A3E635'];
const WEPS=['샷건','독침총','미니건','레이저','카타나','부메랑','저격총','로켓','냉동총','화염','전기','유탄'];
const WP={샷건:{cd:110,pd:110,hp:200,sp:1.0},독침총:{cd:65,pd:165,hp:150,sp:1.1},미니건:{cd:12,pd:140,hp:280,sp:.85},레이저:{cd:130,pd:180,hp:160,sp:.9,ch:50},카타나:{cd:80,pd:50,hp:160,sp:1.35},부메랑:{cd:115,pd:150,hp:190,sp:1.0},저격총:{cd:200,pd:200,hp:140,sp:.9},로켓:{cd:160,pd:155,hp:185,sp:.95},냉동총:{cd:72,pd:145,hp:165,sp:1.1},화염:{cd:48,pd:68,hp:220,sp:1.0},전기:{cd:88,pd:130,hp:180,sp:1.05},유탄:{cd:145,pd:125,hp:185,sp:.95}};

// 승리조건 레이블
const wLabels={last:'최후 생존자 커피',first:'첫 번째 사망자 커피',nth:'N번째 사망자 커피'};

let mode='setup',pCount=3,wMode='last',dN=1;
let cfgs=[],creatures=[],projs=[],parts=[],floats=[],obs=[];
let winner=null,deathOrd=[],aId=null,sId=null,evT=0,fc=0;
let cX=W/2,cY=H/2,cZ=1,tX=W/2,tY=H/2,tZ=1,ts=1,tts=1,vig=0,shk=0,SX=0,SY=0;
let dramaL=[],prevDL=0,dFlash=0;

function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}
function near(a,c){return a&&a.length?a.reduce((p,q)=>d2(p,c)<d2(q,c)?p:q):null;}
function tDir(c,t){const dx=t.x-c.x,dy=t.y-c.y,d=Math.sqrt(dx*dx+dy*dy)||1;return{dx,dy,d,a:Math.atan2(dy,dx)};}
function addFl(t,x,y,col){floats.push({t,x,y,vy:-.45,l:1,col});}
function spP(x,y,col,n){for(let i=0;i<(n||7);i++)parts.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,r:1.5+Math.random()*3,l:1,col});}
function glow(x,y,r,col){cx.globalAlpha=.09;cx.fillStyle=col;cx.beginPath();cx.arc(x,y,r+13,0,Math.PI*2);cx.fill();cx.globalAlpha=.17;cx.fillStyle=col;cx.beginPath();cx.arc(x,y,r+5,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}
function addShk(m){shk=Math.max(shk,m);}
function initCfgs(){cfgs=COLS.map((col,i)=>({name:`${i+1}P`,wep:WEPS[i%WEPS.length],col}));}

function checkDrama(c){if(!c||!c.alive||c.hp/c.hp0>=.22)return;const ex=dramaL.find(d=>d.c===c);if(ex)ex.t=128;else dramaL.push({c,t:128});}
function updCam(){
  dramaL.forEach(d=>{d.t--;if(!d.c.alive||d.c.hp/d.c.hp0>.3)d.t=0;});
  dramaL=dramaL.filter(d=>d.t>0&&d.c.alive);
  const n=dramaL.length;
  if(n>prevDL){addShk(n===1?5:3);dFlash=80;}
  if(n===0&&prevDL>0)addShk(2);
  prevDL=n;
  const any=n>0;
  if(n===1){
    const c=dramaL[0].c,zm=1.42;
    const en=near(creatures.filter(o=>o.alive&&o!==c),c);
    const mx=en?(c.x+en.x)/2:c.x,my=en?(c.y+en.y)/2:c.y;
    const hw=W/(2*zm),hh=H/(2*zm);
    tX=Math.max(hw,Math.min(W-hw,mx));tY=Math.max(hh,Math.min(H-hh,my));tZ=zm;
  }else{tX=W/2;tY=H/2;tZ=1;}
  tts=any?.32:1;vig+=(any?1:0-vig)*.08;
  cX+=(tX-cX)*.08;cY+=(tY-cY)*.08;cZ+=(tZ-cZ)*(tZ>cZ?.09:.05);ts+=(tts-ts)*.07;
}
function resetCam(){cX=tX=W/2;cY=tY=H/2;cZ=tZ=1;ts=tts=1;vig=shk=0;dramaL=[];prevDL=0;dFlash=0;}

function genObs(){
  obs=[];const n=3+~~(Math.random()*4);
  const T=[()=>({w:22+~~(Math.random()*28),h:22+~~(Math.random()*28)}),()=>({w:60+~~(Math.random()*40),h:12+~~(Math.random()*10)}),()=>({w:12+~~(Math.random()*10),h:60+~~(Math.random()*40)})];
  for(let i=0;i<n;i++)for(let a=0;a<80;a++){const t=T[~~(Math.random()*3)](),x=75+Math.random()*(W-t.w-150),y=55+Math.random()*(H-t.h-110);let ok=true;for(const o of obs)if(x<o.x+o.w+38&&x+t.w>o.x-38&&y<o.y+o.h+38&&y+t.h>o.y-38){ok=false;break;}if(ok){obs.push({x,y,...t});break;}}
}
function chR(px,py,pr,rx,ry,rw,rh){const nx=Math.max(rx,Math.min(px,rx+rw)),ny=Math.max(ry,Math.min(py,ry+rh));return(px-nx)**2+(py-ny)**2<pr*pr;}
function pObs(c,o){if(!chR(c.x,c.y,c.r,o.x,o.y,o.w,o.h))return;const nx=Math.max(o.x,Math.min(c.x,o.x+o.w)),ny=Math.max(o.y,Math.min(c.y,o.y+o.h));const dx=c.x-nx,dy=c.y-ny,d=Math.sqrt(dx*dx+dy*dy)||.1,p=c.r-d+1;c.x+=dx/d*p;c.y+=dy/d*p;if(Math.abs(dx)>=Math.abs(dy))c.vx*=-.4;else c.vy*=-.4;}
function lrng(ox,oy,ang){const nx=Math.cos(ang),ny=Math.sin(ang);let r=Math.max(W,H);obs.forEach(o=>{for(let t=8;t<r;t+=6)if(chR(ox+nx*t,oy+ny*t,4,o.x,o.y,o.w,o.h)){r=t;break;}});return r;}
function sPo(n){const pos=[],md=Math.max(40,Math.min(70,W/n*.9));for(let i=0;i<n;i++){let p=null;for(let a=0;a<120;a++){const x=55+Math.random()*(W-110),y=50+Math.random()*(H-100);let ok=true;for(const o of obs)if(x>o.x-28&&x<o.x+o.w+28&&y>o.y-28&&y<o.y+o.h+28){ok=false;break;}if(ok)for(const q of pos)if(d2({x,y},q)<md*md){ok=false;break;}if(ok){p={x,y};break;}}pos.push(p||{x:60+Math.random()*(W-120),y:55+Math.random()*(H-110)});}return pos;}

// ─── 설정 UI ─────────────────────────────────────────────
function rSetup(){
  const wLabel=wLabels[wMode]+(wMode==='nth'?` (${dN}번째)`:'');
  const gc=pCount<=6?Math.min(pCount,3):2;
  document.getElementById('pnl').innerHTML=
  `<div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--text2)">참여자</span>
    <div style="display:flex;gap:3px;flex-wrap:wrap">${[2,3,4,5,6,7,8,9,10].map(n=>`<button class="pb${n===pCount?' on':''}" onclick="setN(${n})">${n}명</button>`).join('')}</div>
    <div style="flex:1"></div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span class="wbadge">☕ ${wLabel}</span>
      <select onchange="wMode=this.value;rSetup()" style="font-size:11px;border:1px solid var(--border2);border-radius:7px;padding:4px 8px;background:var(--bg3);color:var(--text2)">
        <option value="last"${wMode==='last'?' selected':''}>최후 생존자 커피</option>
        <option value="first"${wMode==='first'?' selected':''}>첫 사망자 커피</option>
        <option value="nth"${wMode==='nth'?' selected':''}>N번째 사망자 커피</option>
      </select>
      ${wMode==='nth'?`<div style="display:flex;align-items:center;gap:4px"><input type="number" min="1" max="${pCount}" value="${dN}" oninput="dN=+this.value;rSetup()" style="width:42px;font-size:12px;border:1px solid var(--border2);border-radius:7px;padding:4px 6px;background:var(--bg3);color:var(--text)"><span style="font-size:12px;color:var(--text2)">번째</span></div>`:''}
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(${gc},1fr);gap:6px">${cfgs.slice(0,pCount).map((c,i)=>`<div class="row"><div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${c.col}"></div><span style="width:9px;height:9px;border-radius:50%;background:${c.col};display:inline-block;flex-shrink:0"></span><input value="${c.name}" oninput="cfgs[${i}].name=this.value" maxlength="7" style="flex:1;min-width:0;font-size:12px;font-weight:600"><select onchange="cfgs[${i}].wep=this.value" style="font-size:11px;max-width:72px;flex-shrink:0;border:none;border-radius:5px;padding:2px 4px;background:var(--bg3)">${WEPS.map(w=>`<option value="${w}"${c.wep===w?' selected':''}>${w}</option>`).join('')}</select></div>`).join('')}</div>`;
}

function rLive(){
  const cols=Math.min(pCount<=4?pCount:pCount<=6?3:5,5);
  const wLabel=wLabels[wMode]+(wMode==='nth'?` (${dN}번째)`:'');
  document.getElementById('pnl').innerHTML=
    `<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px"><span class="wbadge">☕ 승리조건: ${wLabel}</span><span style="font-size:11px;color:var(--text3);margin-left:auto">사망순서: ${deathOrd.map(c=>`<span style="color:${c.col}">${c.name}</span>`).join(' → ')||'—'}</span></div>
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:5px">${creatures.map((c)=>{const hp=Math.max(0,c.hp/c.hp0),hc=hp>.6?'#4ECBA0':hp>.3?'#F5A623':'#FF4757',wp=c.chg?(c.chT/(c.ch||50)):Math.max(0,1-c.cdT/c.cd),fo=dramaL.some(d=>d.c===c);return`<div style="border:${fo?'2px solid #FF4757':'1px solid var(--border2)'};border-radius:8px;padding:7px 7px 6px 10px;background:${fo?'rgba(255,71,87,.06)':'var(--bg2)'};position:relative;overflow:hidden;${!c.alive?'opacity:.15':''}"><div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:${c.col}"></div><div style="display:flex;align-items:center;gap:4px;margin-bottom:3px"><span style="font-size:12px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${c.name}</span><span style="font-size:9px;background:${c.col}22;color:${c.col};padding:2px 5px;border-radius:8px">${c.wep}</span></div><div style="height:4px;background:var(--bg3);border-radius:2px;overflow:hidden"><div style="height:4px;width:${~~(hp*100)}%;background:${hc};border-radius:2px"></div></div><div style="height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:2px"><div style="height:3px;width:${~~(wp*100)}%;background:${c.dis>0?'#F97316':wp>=.99?c.col:'rgba(140,140,140,.25)'};border-radius:2px"></div></div>${fo?'<div style="font-size:9px;margin-top:3px;font-weight:700;color:#FF4757">⚠ 위기</div>':''}</div>`;}).join('')}</div>`;
}

function setN(n){pCount=n;rSetup();}

// ─── 게임 초기화 ─────────────────────────────────────────
function init(){
  genObs();const pos=sPo(pCount);
  creatures=cfgs.slice(0,pCount).map((cfg,i)=>{const p=WP[cfg.wep]||WP['샷건'];return{name:cfg.name,col:cfg.col,wep:cfg.wep,cd:p.cd,pd:p.pd,sp:p.sp,ch:p.ch,r:18+Math.random()*6,x:pos[i].x,y:pos[i].y,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,alive:true,hp:p.hp,hp0:p.hp,cdT:~~(p.cd*(.05+Math.random()*.3)),chg:false,chT:0,aAng:0,hfl:0,poi:0,dis:0,slw:0,trail:[],wA:Math.random()*Math.PI*2,sd:Math.random()<.5?1:-1,lb:null,ks:null,flm:null,chain:null};});
  projs=[];parts=[];floats=[];deathOrd=[];resetCam();
}

// ─── 전투 로직 ───────────────────────────────────────────
function explode(x,y,r,dm,col){
  creatures.filter(o=>o.alive).forEach(o=>{const dd=Math.sqrt(d2({x,y},o));if(dd<r+o.r){const d=~~(dm*(1-dd/(r+o.r)));if(d>0){o.hp-=d;o.hfl=12;checkDrama(o);if(d>8)addFl('-'+d,o.x,o.y-o.r-8,col);}}});
  spP(x,y,col,16);addShk(6);
}
function laser(c){
  const tgt=near(creatures.filter(o=>o.alive&&o!==c),c);
  const ang=tgt?tDir(c,tgt).a:c.aAng,nx=Math.cos(ang),ny=Math.sin(ang),rng=lrng(c.x,c.y,ang);
  creatures.filter(o=>o.alive&&o!==c).forEach(o=>{const px=o.x-c.x,py=o.y-c.y,pr=px*nx+py*ny;if(pr<0||pr>rng)return;if(Math.abs(px*ny-py*nx)<o.r+6){o.hp-=46;o.hfl=16;addShk(4);addFl('-46',o.x,o.y-o.r-10,c.col);spP(o.x,o.y,c.col,5);checkDrama(o);}});
  c.lb={a:ang,rng,l:22};
}
function mele(c,ang){
  creatures.filter(o=>o.alive&&o!==c).forEach(o=>{const dx=o.x-c.x,dy=o.y-c.y,d=Math.sqrt(dx*dx+dy*dy);if(d>72+o.r)return;let df=Math.abs(Math.atan2(dy,dx)-ang);if(df>Math.PI)df=Math.PI*2-df;if(df<.92){o.hp-=44;o.hfl=16;addShk(5);addFl('-44',o.x,o.y-o.r-10,c.col);spP(o.x,o.y,c.col,7);checkDrama(o);}});
  c.ks={a:ang,l:20};
}
function fire(c,tgt){
  if(!tgt)return;const{a}=tDir(c,tgt);
  if(c.wep==='샷건'){for(let i=-2;i<=2;i++){const s=i*.13;projs.push({x:c.x,y:c.y,vx:Math.cos(a+s)*5.4,vy:Math.sin(a+s)*5.4,ow:c,dm:11,r:3.5,tp:'p',l:28,col:c.col,bn:1,sd:i===0});}}
  else if(c.wep==='독침총')projs.push({x:c.x,y:c.y,vx:Math.cos(a)*5.5,vy:Math.sin(a)*5.5,ow:c,dm:7,r:3.5,tp:'d',l:38,col:c.col,bn:0,po:90,sd:true});
  else if(c.wep==='미니건'){const j=(Math.random()-.5)*.22;projs.push({x:c.x,y:c.y,vx:Math.cos(a+j)*6.4,vy:Math.sin(a+j)*6.4,ow:c,dm:5,r:2.5,tp:'b',l:26,col:c.col,bn:0,sd:false});}
  else if(c.wep==='카타나')mele(c,a);
  else if(c.wep==='부메랑')projs.push({x:c.x,y:c.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,ow:c,dm:26,r:6,tp:'bo',l:115,col:c.col,bn:0,tT:0,ret:false,oRef:c,hs:[],sd:true});
  else if(c.wep==='저격총'){const rng=lrng(c.x,c.y,a),nx=Math.cos(a),ny=Math.sin(a);creatures.filter(o=>o.alive&&o!==c).forEach(o=>{const px=o.x-c.x,py=o.y-c.y,pr=px*nx+py*ny;if(pr>0&&pr<rng&&Math.abs(px*ny-py*nx)<o.r+5){o.hp-=60;o.hfl=20;addShk(5);addFl('-60',o.x,o.y-o.r-8,c.col);spP(o.x,o.y,c.col,6);checkDrama(o);}});c.lb={a,rng,l:12};}
  else if(c.wep==='로켓')projs.push({x:c.x,y:c.y,vx:Math.cos(a)*2.6,vy:Math.sin(a)*2.6,ow:c,dm:38,r:7,tp:'rkt',l:140,col:c.col,bn:0,sd:true,aoe:44});
  else if(c.wep==='냉동총')projs.push({x:c.x,y:c.y,vx:Math.cos(a)*5.5,vy:Math.sin(a)*5.5,ow:c,dm:5,r:4,tp:'frz',l:40,col:'#B5D4F4',bn:0,slw:210,sd:true});
  else if(c.wep==='화염'){const en=creatures.filter(o=>o.alive&&o!==c&&d2(o,c)<85*85);en.forEach(o=>{o.hp-=14;o.hfl=6;addFl('-14',o.x,o.y-o.r-8,c.col);checkDrama(o);});if(en.length)addShk(2);c.flm={l:10};}

function stepP(p){

  drawWinBadge();
  if(vig>.03){const vg=cx.createRadialGradient(W/2,H/2,W*.12,W/2,H/2,W*.9);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(200,20,20,${vig*.55})`);cx.fillStyle=vg;cx.fillRect(0,0,W,H);}
  if(ts<.75){const al=(1-ts/.75)*.82;cx.globalAlpha=al;cx.fillStyle='rgba(0,0,0,.55)';cx.beginPath();cx.roundRect(8,8,68,22,11);cx.fill();cx.fillStyle='#FF4757';cx.font='600 10px sans-serif';cx.textAlign='left';cx.textBaseline='middle';cx.fillText('● SLOW',14,19);cx.globalAlpha=1;}
  if(dFlash>0){dFlash--;const al=Math.sin(dFlash/80*Math.PI)*.9;if(al>.05){cx.globalAlpha=al;cx.fillStyle='rgba(0,0,0,.7)';cx.beginPath();cx.roundRect(W/2-70,H/2-16,140,32,16);cx.fill();cx.fillStyle='#FF4757';cx.font='700 14px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('⚠ 위기 상황',W/2,H/2);cx.globalAlpha=1;}}
}
function drawS(){
  cx.fillStyle='#0B0B1A';cx.fillRect(0,0,W,H);
  for(let x=20;x<W;x+=28)for(let y=20;y<H;y+=28){cx.globalAlpha=.04;cx.fillStyle='#fff';cx.beginPath();cx.arc(x,y,.7,0,Math.PI*2);cx.fill();}cx.globalAlpha=1;
  drawWinBadge();
  const now=Date.now(),cols=Math.min(pCount,5),rows=Math.ceil(pCount/cols);
  cfgs.slice(0,pCount).forEach((cfg,i)=>{
    const col=i%cols,row=~~(i/cols),px=W/(cols+1)*(col+1),py=H/(rows+1)*(row+1),by=py+Math.sin(now*.002+i*1.1)*5;
    glow(px,by,20,cfg.col);cx.fillStyle=cfg.col;cx.beginPath();cx.arc(px,by,20,0,Math.PI*2);cx.fill();
    cx.globalAlpha=.22;cx.fillStyle='#fff';cx.beginPath();cx.arc(px-4,by-4,9,0,Math.PI*2);cx.fill();cx.globalAlpha=1;
    cx.fillStyle='rgba(255,255,255,.9)';cx.beginPath();cx.arc(px-6,by-3,3.2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(px+6,by-3,3.2,0,Math.PI*2);cx.fill();
    cx.fillStyle='#0B0B1A';cx.beginPath();cx.arc(px-5.5,by-3,1.6,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(px+6.5,by-3,1.6,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,255,255,.92)';cx.font='700 10px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(cfg.name,px,by);
    cx.fillStyle=cfg.col;cx.font='600 9px sans-serif';cx.fillText(cfg.wep,px,by+27);
  });
}
function sLoop(){if(mode!=='setup')return;drawS();sId=requestAnimationFrame(sLoop);}
function loop(){
  if(mode!=='playing')return;
  try{step();}catch(e){console.error(e);}try{draw();}catch(e){console.error(e);}
  fc++;if(fc%20===0)rLive();aId=requestAnimationFrame(loop);
}
function setBan(t){const b=document.getElementById('eb');b.textContent=t;b.classList.add('on');clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('on'),2400);}
function showRes(){
  resetCam();dramaL=[];
  try{draw();}catch(e){}rLive();
  let loser=null;
  if(wMode==='last')loser=winner;
  else if(wMode==='first')loser=deathOrd[0];
  else loser=deathOrd[Math.min(dN-1,deathOrd.length-1)]||winner;
  const rx=document.getElementById('rx');rx.style.display='block';
  rx.style.background=loser?`${loser.col}11`:'#0a1a0d';
  rx.style.border=loser?`1px solid ${loser.col}44`:'1px solid #48BB7844';
  rx.innerHTML=`
    <div style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:6px">승리조건: ${wLabels[wMode]}${wMode==='nth'?' ('+dN+'번째)':''}</div>
    <div style="font-size:24px;font-weight:800;margin-bottom:6px;color:${loser?.col||'#4ECBA0'}">☕ ${loser?loser.name:winner?.name||'?'}</div>
    <div style="font-size:15px;font-weight:600;color:${loser?.col||'#4ECBA0'}">${loser?loser.name+' ('+loser.wep+') 커피 사야함!':'전멸'}</div>
    ${deathOrd.length?`<div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:10px">사망순서: ${deathOrd.map(c=>`<span style="color:${c.col}">${c.name}</span>`).join(' → ')}</div>`:''}
  `;
  document.getElementById('sb').textContent='다시 시작';
}
function startG(){
  if(mode==='ended'){backS();return;}if(mode==='playing')return;
  cancelAnimationFrame(sId);init();mode='playing';evT=0;fc=0;
  document.getElementById('rx').style.display='none';document.getElementById('sb').textContent='진행 중...';
  setBan('🥊 배틀 시작!');loop();
}
function backS(){
  mode='setup';winner=null;cancelAnimationFrame(aId);projs=[];parts=[];floats=[];obs=[];deathOrd=[];resetCam();
  document.getElementById('rx').style.display='none';document.getElementById('sb').textContent='시작하기';
  document.getElementById('eb').textContent='크리처를 설정하고 시작하세요';document.getElementById('eb').classList.remove('on');
  rSetup();sLoop();
}
document.getElementById('sb').onclick=startG;
document.getElementById('rb').onclick=backS;
window.addEventListener('resize',()=>{
  const nw=CV.offsetWidth;if(Math.abs(nw-W)<2)return;
  location.reload();
});
initCfgs();rSetup();sLoop();
</script>
